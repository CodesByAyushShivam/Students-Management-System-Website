<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Ayush College of Engineering</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles/dashboard.css">
</head>

<body>
    <div class="nav">
        <div class="logo">
            <div class="img"></div>
            <div class="title">
                Ayush College of Engineering
            </div>
        </div>
        <div class="logout">
            <button onclick="logout()">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </div>

    <div class="leftnav">
        <div class="info">
            <div class="user-pfp"><i class="fa-solid fa-user-graduate"></i></div>
            <div class="user-name">Student</div>
            <div class="user-reg">Reg: Registration No.</div>
            <div class="sem-info">Sem X <strong>&middot;</strong> Branch</div>
        </div>

        <nav>
            <div id="dashboard" class="nav-items active">
                <i class="fa-regular fa-chart-bar"></i>
                Dashboard
            </div>
            <div id="marks" class="nav-items" onclick="openMarks()">
                <i class="fa-solid fa-list-check"></i>
                Marks
            </div>
            <div id="notices" class="nav-items" onclick="openNotices()">
                <i class="fa-regular fa-bell"></i>
                Notices
            </div>
            <div id="payments" class="nav-items" onclick="openPayments()">
                <i class="fa-regular fa-credit-card"></i>
                Payments
            </div>
        </nav>
    </div>


    <main class="main-content">
        <div class="grid">
            <div class="greet box">
                <h1>Welcome back, <span class="first-name">Student</span>!</h1>
                <p>Here's a quick overview of your academic performance for semester <span class="semester">X</span>.
                </p>
            </div>

            <div class="subjects glass box">
                <i class="fa-solid fa-book-open"></i>
                <p id="subjectsCount">X</p>
                <span>SUBJECTS</span>
            </div>

            <div class="sgpa glass box">
                <i class="fa-solid fa-graduation-cap"></i>
                <p id="sgpa">X</p>
                <span>SGPA</span>
            </div>

            <div class="marks box">
                <div class="marks-head">
                    <h1>Marks</h1>
                    <div class="dots">
                        <i class="fa-regular fa-circle"></i><i class="fa-regular fa-circle"></i><i class="fa-regular fa-circle"></i>
                    </div>
                </div>
                <hr>

                <div class="marks-table">

                    <!-- Subject marks table of result will be added here dynamically using js -->

                </div>
            </div>

            <div class="credits glass box">
                <div class="credit-content">
                    <span>TOTAL CREDITS</span>
                    <p id="total-credits">X</p>
                </div>

                <div class="cred-icon">
                    <i class="fa-solid fa-bolt fa-beat-fade"></i>
                </div>
            </div>


            <div class="attendance box">

            </div>
        </div>
    </main>
    <script src="scripts/auth.js"></script>
    <script src="scripts/dashboard.js"></script>
</body>

</html>
